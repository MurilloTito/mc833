services:
  roteador:
    build: .
    container_name: roteador
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1 # Ativa o encaminhamento de pacotes. Ou seja se chegar um pacote que não é pra esse container docker ele redireciona.
    networks:
      rede_a:
        ipv4_address: 172.20.0.254
      rede_b:
        ipv4_address: 172.21.0.254
    command: bash -c "apt-get update; tail -f /dev/null"
    volumes:
      - "/tmp/docker_lab_${USER}/roteador:/app"
    working_dir: /app

  servidor:
    build: .
    container_name: servidor
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      rede_a:
        ipv4_address: 172.20.0.2
    command: bash -c "apt update; ip route del default; ip route add default via 172.20.0.254; tail -f /dev/null"
    volumes:
      - "/tmp/docker_lab_${USER}/servidor:/app"
    working_dir: /app

  cliente:
    build: .
    container_name: client
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      rede_b:
        ipv4_address: 172.21.0.2
    # Por padrão o docker tentar ser o gateway dos containers, para o nosso ambiente funcionar nós mudamos para o getway ser o nosso roteador ;)
    command: bash -c "apt update; ip route del default; ip route add default via 172.21.0.254; tail -f /dev/null"
    volumes:
      - "/tmp/docker_lab_${USER}/cliente:/app"
    working_dir: /app

networks:
  rede_a:
    ipam:
      config:
        - subnet: 172.20.0.0/24
  rede_b:
    ipam:
      config:
        - subnet: 172.21.0.0/24

